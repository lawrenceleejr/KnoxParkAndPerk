<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knox Pick-Me-Up — Card Scanner</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
  :root {
    --paper: #faf5eb; --paper-2: #f2e9d8; --ink: #241a10; --ink-2: #6f5f4c;
    --night: #101a30; --orange: #ff8200; --orange-ink: #b04e00;
    --gold: #eda953; --rule: #ddcfb4;
    --ok: #2e7d32; --warn: #b04e00; --bad: #b3261e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: var(--paper); color: var(--ink);
    min-height: 100vh; line-height: 1.5;
  }
  .wrap { max-width: 30rem; margin: 0 auto; padding: 1rem 1.25rem 3rem; }
  header { display: flex; align-items: center; gap: .6rem; padding: .9rem 0; border-bottom: 1px solid var(--rule); }
  header img { width: 1.9rem; height: 1.9rem; }
  header .name { font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 1.15rem; }
  header .tool { margin-left: auto; font-size: .68rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--orange-ink); }
  .shopline { padding: .9rem 0 .2rem; font-size: .8rem; color: var(--ink-2); }
  .shopline b { color: var(--ink); font-weight: 600; }
  .badge-demo { display: inline-block; margin-left: .5rem; font-size: .62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--bad); border: 1px solid var(--bad); border-radius: 2px; padding: .05rem .4rem; }

  #viewport {
    position: relative; margin-top: 1rem; border-radius: 6px; overflow: hidden;
    background: var(--night); aspect-ratio: 1 / 1;
  }
  #viewport video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #viewport [hidden] { display: none !important; }
  #overlay { position: absolute; inset: 0; pointer-events: none; }
  #reticle {
    position: absolute; inset: 12%; pointer-events: none;
    --ret: rgba(250,245,235,.9);
    transition: --ret .15s;
  }
  #reticle .corner { position: absolute; width: 34px; height: 34px; border: 3px solid var(--ret); transition: border-color .2s ease; }
  #reticle .c1 { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 10px; }
  #reticle .c2 { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 10px; }
  #reticle .c3 { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 10px; }
  #reticle .c4 { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 10px; }
  #reticle.ok .corner { border-color: #58c463; }
  #reticle.warn .corner { border-color: var(--orange); }
  #reticle.bad .corner { border-color: #ff6b5e; }
  #scanline {
    position: absolute; left: 8%; right: 8%; top: 12%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,130,0,.9), transparent);
    animation: sweep 2.4s ease-in-out infinite; display: none;
  }
  @keyframes sweep { 0%,100% { top: 13%; } 50% { top: 85%; } }
  @media (prefers-reduced-motion: reduce) { #scanline { animation: none; top: 50%; } }
  #camhint {
    position: absolute; left: 0; right: 0; bottom: .7rem; text-align: center;
    font-size: .72rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(250,245,235,.85); text-shadow: 0 1px 4px rgba(0,0,0,.6); display: none;
  }
  #camstop {
    position: absolute; top: .6rem; left: .6rem; display: none;
    font: inherit; font-size: 1.05rem; line-height: 1;
    background: rgba(10,16,31,.55); color: var(--paper); border: 1px solid rgba(250,245,235,.35);
    border-radius: 999px; padding: .45rem .62rem; cursor: pointer;
  }
  #torch {
    position: absolute; top: .6rem; right: .6rem; display: none;
    font: inherit; font-size: 1.05rem; line-height: 1;
    background: rgba(10,16,31,.55); color: var(--paper); border: 1px solid rgba(250,245,235,.35);
    border-radius: 999px; padding: .45rem .55rem; cursor: pointer;
  }
  #torch[aria-pressed="true"] { background: var(--orange); color: var(--night); border-color: var(--orange); }
  .shoppick { margin-top: .4rem; }
  .shoppick select {
    font: inherit; font-size: 1rem; width: 100%; padding: .65rem .8rem;
    border: 1px solid var(--rule); border-radius: 4px; background: #fff; color: var(--ink);
  }
  #camstart {
    position: absolute; inset: 0; display: flex; flex-direction: column; gap: .8rem;
    align-items: center; justify-content: center; color: var(--paper);
    background: var(--night); cursor: pointer; border: 0; width: 100%;
    font: inherit; text-align: center; padding: 1rem;
  }
  #camstart .big { font-family: 'Fraunces', Georgia, serif; font-size: 1.3rem; font-weight: 600; }
  #camstart .small { font-size: .8rem; color: #b9b3a4; max-width: 24ch; }

  #status {
    margin-top: 1rem; border-radius: 6px; padding: 1rem 1.1rem;
    border: 1px solid var(--rule); background: #fff; min-height: 4.4rem;
  }
  #status .s-title { font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 1.15rem; }
  #status .s-sub { font-size: .82rem; color: var(--ink-2); margin-top: .15rem; }
  #status.ok { border-color: var(--ok); background: #f0f7f0; }
  #status.ok .s-title { color: var(--ok); }
  #status.warn { border-color: var(--warn); background: #fdf3e7; }
  #status.warn .s-title { color: var(--warn); }
  #status.bad { border-color: var(--bad); background: #fdefee; }
  #status.bad .s-title { color: var(--bad); }

  .manual { margin-top: 1.4rem; }
  .label { font-size: .68rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); display: block; margin-bottom: .5rem; }
  .manual .row { display: flex; gap: .5rem; }
  .manual input {
    flex: 1; font: inherit; font-size: 1rem; padding: .65rem .8rem;
    border: 1px solid var(--rule); border-radius: 4px; background: #fff; color: var(--ink);
    text-transform: uppercase;
  }
  .manual input:focus { outline: 2px solid var(--orange); border-color: var(--orange); }
  button.btn {
    font: inherit; font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    background: var(--ink); color: var(--paper); border: 0; border-radius: 4px;
    padding: .65rem 1.1rem; cursor: pointer;
  }
  button.btn:active { background: var(--orange-ink); }

  #log { margin-top: 1.6rem; }
  #log ul { list-style: none; border-top: 1px solid var(--rule); }
  #log li { display: flex; justify-content: space-between; gap: 1rem; padding: .5rem 0; border-bottom: 1px solid var(--rule); font-size: .85rem; }
  #log li .st { font-weight: 600; }
  #log li .st.ok { color: var(--ok); } #log li .st.warn { color: var(--warn); } #log li .st.bad { color: var(--bad); }
  #queuenote { margin-top: .8rem; font-size: .78rem; color: var(--warn); display: none; }

  .setup { margin-top: 1.2rem; padding: 1rem 1.1rem; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper-2); font-size: .85rem; color: var(--ink-2); }
  .setup code { background: #fff; padding: .05rem .3rem; border-radius: 3px; font-size: .8rem; }
  footer { margin-top: 2.5rem; font-size: .72rem; color: var(--ink-2); }
  footer a { color: var(--orange-ink); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="assets/logo-mark.svg" alt="">
    <span class="name">Knox Pick-Me-Up</span>
    <span class="tool">Card scanner</span>
  </header>

  <p class="shopline" id="shopline"></p>

  <div class="shoppick" id="shoppick" hidden>
    <span class="label">Select your shop</span>
    <select id="shopselect"><option value="">Choose your shop…</option></select>
  </div>

  <div id="viewport">
    <video id="video" playsinline muted hidden></video>
    <canvas id="overlay"></canvas>
    <div id="scanline"></div>
    <div id="reticle" hidden>
      <span class="corner c1"></span><span class="corner c2"></span>
      <span class="corner c3"></span><span class="corner c4"></span>
    </div>
    <p id="camhint">Looking for a card…</p>
    <button id="camstop" type="button" title="Stop camera" aria-label="Stop camera">&#10005;</button>
    <button id="torch" type="button" aria-pressed="false" title="Flashlight">&#9889;</button>
    <button id="camstart" type="button">
      <span class="big">Tap to start scanning</span>
      <span class="small">Point the camera at the QR code on the Morning Pick-Me-Up card.</span>
    </button>
  </div>

  <div id="status"><div class="s-title">Ready.</div><div class="s-sub">Scan a card, or type its serial below.</div></div>
  <p id="queuenote"></p>

  <div class="manual">
    <span class="label">Manual entry (if the code won&rsquo;t scan)</span>
    <div class="row">
      <input id="serialbox" placeholder="KPMU-2026-00004217H" autocomplete="off" autocapitalize="characters" spellcheck="false">
      <button class="btn" id="manualgo" type="button">Log it</button>
    </div>
  </div>

  <div id="log">
    <span class="label">This session</span>
    <ul id="loglist"></ul>
  </div>

  <div class="setup" id="setupnote" hidden></div>

  <footer>Volunteer-run · Data goes to the program&rsquo;s Google Sheet · Questions: <a href="mailto:hello@knoxpickmeup.org">hello@knoxpickmeup.org</a> · <a href="index.html">knoxpickmeup site</a></footer>
</div>

<script>
'use strict';
/* ================= CONFIG =================
   1. Create the redemption Sheet + Apps Script web app (see design/LOGGING.md).
   2. Paste the deployed web-app URL below (ends in /exec).
   3. List participating shops: slug -> display name. Each shop's register QR
      points to  redeem.html?shop=<slug>
   Leave SCRIPT_URL empty to run in DEMO mode (nothing leaves the phone). */
const SCRIPT_URL = '';
const SHOPS = {
  'demo-cafe': 'Demo Cafe (testing)',
  // 'wild-love': 'Wild Love Bakehouse',
  // 'remedy':    'Remedy Coffee',
  // 'k-brew':    'K Brew Downtown',
};
/* ========================================== */

const SERIAL_RE = /KPMU-\d{4}-\d{8}[A-HJ-NP-Z]/i;   // trailing letter = keyed checksum
const qs = new URLSearchParams(location.search);
const shopSlug = (qs.get('shop') || '').toLowerCase();

/* Local serial validation. The register QR carries k=<derived check key>
   (see design/LOGGING.md) — derived one-way from the program secret, so it
   can live on printed paper without exposing anything else. With it, the
   scanner verifies every serial's checksum letter instantly, even offline.
   The server re-checks regardless. */
const CK_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
if (qs.get('k')) localStorage.setItem('kpmu-ck', qs.get('k'));
const ckHex = qs.get('k') || localStorage.getItem('kpmu-ck') || '';
let ckKey = null;
if (ckHex && window.crypto && crypto.subtle) {
  crypto.subtle.importKey('raw', new TextEncoder().encode(ckHex),
    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign'])
    .then(k => { ckKey = k; }).catch(() => {});
}
async function serialOk(serial) {
  if (!ckKey) return null;   // no key on this device — server decides
  const sig = new Uint8Array(await crypto.subtle.sign(
    'HMAC', ckKey, new TextEncoder().encode(serial.slice(0, -1))));
  return CK_ALPHABET[sig[0] % 24] === serial.slice(-1);
}
const shopName = SHOPS[shopSlug] || null;
const demo = !SCRIPT_URL;

const $ = id => document.getElementById(id);
const statusEl = $('status'), logList = $('loglist');
const seen = new Set(JSON.parse(localStorage.getItem('kpu-seen') || '[]'));
let queue = JSON.parse(localStorage.getItem('kpu-queue') || '[]');

function saveLocal() {
  localStorage.setItem('kpu-seen', JSON.stringify([...seen].slice(-2000)));
  localStorage.setItem('kpu-queue', JSON.stringify(queue));
}

function setStatus(kind, title, sub) {
  statusEl.className = kind;
  statusEl.innerHTML = '<div class="s-title"></div><div class="s-sub"></div>';
  statusEl.children[0].textContent = title;
  statusEl.children[1].textContent = sub || '';
  if (kind === 'ok' && navigator.vibrate) navigator.vibrate(80);
  if (kind === 'bad' && navigator.vibrate) navigator.vibrate([60, 60, 60]);
}

function addLog(serial, kind, note) {
  const li = document.createElement('li');
  const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  li.innerHTML = '<span></span><span class="st"></span>';
  li.children[0].textContent = serial + ' · ' + t;
  li.children[1].textContent = note;
  li.children[1].classList.add(kind);
  logList.prepend(li);
}

function updateQueueNote() {
  const n = $('queuenote');
  if (queue.length) {
    n.style.display = 'block';
    n.textContent = queue.length + ' scan(s) saved on this phone, waiting for signal — they will retry automatically.';
  } else n.style.display = 'none';
}

async function submit(serial) {
  const rec = { serial, shop: shopSlug, at: new Date().toISOString() };
  if (demo) return { status: 'ok', demo: true };
  const u = SCRIPT_URL + '?action=redeem'
    + '&serial=' + encodeURIComponent(serial)
    + '&shop=' + encodeURIComponent(shopSlug)
    + '&at=' + encodeURIComponent(rec.at);
  const res = await fetch(u, { method: 'GET' });
  return res.json();
}

async function flushQueue() {
  if (demo || !queue.length) return;
  const pending = queue; queue = []; saveLocal(); updateQueueNote();
  for (const rec of pending) {
    try {
      await fetch(SCRIPT_URL + '?action=redeem&serial=' + encodeURIComponent(rec.serial)
        + '&shop=' + encodeURIComponent(rec.shop) + '&at=' + encodeURIComponent(rec.at));
    } catch (e) { queue.push(rec); }
  }
  saveLocal(); updateQueueNote();
}
window.addEventListener('online', flushQueue);

let busy = false, lastSerial = '', lastAt = 0;
async function handleSerial(raw, fromCamera) {
  const m = String(raw).match(SERIAL_RE);
  if (!m) return false;
  const serial = m[0].toUpperCase();
  const now = Date.now();
  // debounce only camera frames — the same code sits in view for many frames
  if (fromCamera && serial === lastSerial && now - lastAt < 4000) { lastAt = now; return true; }
  lastSerial = serial; lastAt = now;
  if (busy) return true;
  busy = true;

  const localCheck = await serialOk(serial);
  if (localCheck === false) {
    if (fromCamera) flashReticle('bad');
    setStatus('bad', 'Serial doesn’t check out', serial + ' fails the check letter — mistyped, or not a real card.');
    addLog(serial, 'bad', 'invalid');
    // audit on the server when reachable, but never queue or remember it
    if (!demo && navigator.onLine) submit(serial).catch(() => {});
    busy = false;
    return true;
  }

  if (seen.has(serial)) {
    if (fromCamera) flashReticle('warn');
    setStatus('warn', 'Already scanned on this phone', serial + ' was logged here earlier. One coffee per card.');
    addLog(serial, 'warn', 'duplicate');
    busy = false;
    return true;
  }

  setStatus('', 'Logging ' + serial + '…', '');
  try {
    const out = await submit(serial);
    if (out.status !== 'void' && out.status !== 'invalid') { seen.add(serial); saveLocal(); }
    if (out.status === 'invalid') {
      if (fromCamera) flashReticle('bad');
      setStatus('bad', 'Serial doesn’t check out', serial + ' fails the check letter — mistyped, or not a real card. The attempt has been logged.');
      addLog(serial, 'bad', 'invalid');
    } else if (out.status === 'void') {
      if (fromCamera) flashReticle('bad');
      setStatus('bad', 'Card not valid', serial + ' belongs to a card pack that was voided (lost or withdrawn). Don’t accept it — the attempt has been logged.');
      addLog(serial, 'bad', 'voided pack');
    } else if (out.status === 'duplicate') {
      if (fromCamera) flashReticle('bad');
      setStatus('bad', 'Card already redeemed', serial + ' was used at ' + (out.firstShop || 'another shop') + ' ' + (out.firstAt ? 'on ' + out.firstAt : 'earlier') + '.');
      addLog(serial, 'bad', 'already used');
    } else {
      if (fromCamera) flashReticle('ok');
      const issued = out.bar ? ' Issued by ' + out.bar + '.' : '';
      setStatus('ok', 'Good to go — coffee’s on us ☀', serial + (out.demo ? ' (demo mode: not sent anywhere)' : ' logged for ' + (shopName || shopSlug)) + '.' + issued);
      addLog(serial, 'ok', out.demo ? 'demo' : 'logged');
    }
  } catch (e) {
    queue.push({ serial, shop: shopSlug, at: new Date().toISOString() });
    seen.add(serial); saveLocal(); updateQueueNote();
    if (fromCamera) flashReticle('warn');
    setStatus('warn', 'No signal — saved on this phone', serial + ' will be sent automatically when the connection returns. Hand over the coffee.');
    addLog(serial, 'warn', 'queued');
  }
  busy = false;
  return true;
}

/* ---------- camera + detection feedback ---------- */
const video = $('video'), overlay = $('overlay'), reticle = $('reticle');
let detector = null, canvas, ctx, octx, track = null;
let lastDrawAt = 0, retTimer = null;

// reticle color pulse keyed to the scan outcome
function flashReticle(kind) {
  reticle.className = kind || '';
  clearTimeout(retTimer);
  retTimer = setTimeout(() => { reticle.className = ''; }, 1400);
}

// map video-pixel coords -> overlay pixels (video is object-fit: cover)
function mapPoint(p) {
  const dw = overlay.width, dh = overlay.height;
  const vw = video.videoWidth || 1, vh = video.videoHeight || 1;
  const sc = Math.max(dw / vw, dh / vh);
  return { x: p.x * sc - (vw * sc - dw) / 2, y: p.y * sc - (vh * sc - dh) / 2 };
}

// highlight the located code: orange polygon + serial chip above it
function drawDetection(corners, label) {
  if (!octx || !corners || corners.length < 4) return;
  const pts = corners.map(mapPoint);
  octx.clearRect(0, 0, overlay.width, overlay.height);
  octx.beginPath();
  pts.forEach((p, i) => i ? octx.lineTo(p.x, p.y) : octx.moveTo(p.x, p.y));
  octx.closePath();
  octx.fillStyle = 'rgba(255,130,0,.16)';
  octx.strokeStyle = '#ff8200';
  octx.lineWidth = 3.5;
  octx.lineJoin = 'round';
  octx.fill(); octx.stroke();
  pts.forEach(p => { octx.beginPath(); octx.arc(p.x, p.y, 4.5, 0, 7); octx.fillStyle = '#ff8200'; octx.fill(); });
  if (label) {
    const topY = Math.min(...pts.map(p => p.y)), cx = pts.reduce((a, p) => a + p.x, 0) / pts.length;
    octx.font = '600 15px Inter, sans-serif';
    const w = octx.measureText(label).width + 18;
    const bx = Math.min(Math.max(cx - w / 2, 6), overlay.width - w - 6), by = Math.max(topY - 34, 6);
    octx.fillStyle = 'rgba(10,16,31,.85)';
    octx.beginPath(); octx.roundRect(bx, by, w, 25, 5); octx.fill();
    octx.fillStyle = '#faf5eb';
    octx.fillText(label, bx + 9, by + 17.5);
  }
  lastDrawAt = Date.now();
  $('camhint').textContent = 'Card found';
}

function clearDetection() {
  if (octx && lastDrawAt && Date.now() - lastDrawAt > 600) {
    octx.clearRect(0, 0, overlay.width, overlay.height);
    lastDrawAt = 0;
    $('camhint').textContent = 'Looking for a card…';
  }
}

// jsQR (130 KB) is only fetched when the camera starts AND the browser has no
// native BarcodeDetector — most phones never download it, and the page itself
// stays a ~20 KB instant load.
function loadJsQR() {
  if (window.jsQR) return Promise.resolve();
  return new Promise((res, rej) => {
    const sc = document.createElement('script');
    sc.src = 'assets/vendor/jsQR.min.js';
    sc.onload = res; sc.onerror = rej;
    document.head.appendChild(sc);
  });
}

function stopCamera() {
  if (track) { track.stop(); track = null; }
  video.srcObject = null;
  video.hidden = true; reticle.hidden = true; reticle.className = '';
  $('scanline').style.display = 'none';
  $('camhint').style.display = 'none';
  $('torch').style.display = 'none'; $('torch').setAttribute('aria-pressed', 'false');
  $('camstop').style.display = 'none';
  if (octx) octx.clearRect(0, 0, overlay.width, overlay.height);
  lastDrawAt = 0;
  $('camstart').hidden = false;
}
$('camstop').addEventListener('click', stopCamera);

async function startCamera() {
  try {
    if (!('BarcodeDetector' in window)) {
      try { await loadJsQR(); }
      catch (e) { setStatus('bad', 'Scanner failed to load', 'Check your connection and try again, or use manual entry below.'); return; }
    }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }, audio: false
    });
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];
    video.hidden = false; reticle.hidden = false; $('camstart').hidden = true;
    $('scanline').style.display = 'block';
    $('camhint').style.display = 'block';
    $('camstop').style.display = 'block';
    await video.play();
    // overlay canvas at device-pixel resolution
    const r = $('viewport').getBoundingClientRect();
    overlay.width = Math.round(r.width * devicePixelRatio);
    overlay.height = Math.round(r.height * devicePixelRatio);
    overlay.style.width = r.width + 'px'; overlay.style.height = r.height + 'px';
    octx = overlay.getContext('2d');
    // torch button, where the hardware supports it
    try {
      if (track.getCapabilities && track.getCapabilities().torch) {
        const t = $('torch');
        t.style.display = 'block';
        t.addEventListener('click', async () => {
          const on = t.getAttribute('aria-pressed') !== 'true';
          await track.applyConstraints({ advanced: [{ torch: on }] });
          t.setAttribute('aria-pressed', String(on));
        });
      }
    } catch (e) { /* no torch — fine */ }
    if ('BarcodeDetector' in window) {
      try { detector = new BarcodeDetector({ formats: ['qr_code'] }); } catch (e) { detector = null; }
    }
    if (!detector) { canvas = document.createElement('canvas'); ctx = canvas.getContext('2d', { willReadFrequently: true }); }
    scanLoop();
  } catch (e) {
    setStatus('bad', 'Camera unavailable', 'Allow camera access in your browser settings, or use manual entry below.');
  }
}

async function scanLoop() {
  if (!video.srcObject) return;
  try {
    if (detector) {
      let codes;
      try {
        codes = await detector.detect(video);
      } catch (e) {
        // Some platforms expose BarcodeDetector but its detect service fails
        // at runtime (notably desktop Linux Chrome). Fall back to jsQR once.
        detector = null;
        await loadJsQR();
        canvas = document.createElement('canvas');
        ctx = canvas.getContext('2d', { willReadFrequently: true });
        codes = [];
      }
      for (const c of codes) {
        const m = String(c.rawValue).match(SERIAL_RE);
        drawDetection(c.cornerPoints.map(p => ({ x: p.x, y: p.y })), m ? m[0].toUpperCase() : 'Not a card QR');
        if (await handleSerial(c.rawValue, true)) break;
      }
      if (detector && !codes.length) clearDetection();
    } else if (video.readyState >= 2) {
      const w = 480, h = Math.round(480 * video.videoHeight / video.videoWidth) || 480;
      canvas.width = w; canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      const img = ctx.getImageData(0, 0, w, h);
      const code = jsQR(img.data, w, h, { inversionAttempts: 'dontInvert' });
      if (code && code.data) {
        const k = (video.videoWidth || w) / w;   // scale jsQR coords back to video pixels
        const L = code.location;
        const m = String(code.data).match(SERIAL_RE);
        drawDetection([L.topLeftCorner, L.topRightCorner, L.bottomRightCorner, L.bottomLeftCorner]
          .map(p => ({ x: p.x * k, y: p.y * k })), m ? m[0].toUpperCase() : 'Not a card QR');
        await handleSerial(code.data, true);
      } else clearDetection();
    }
  } catch (e) { /* keep scanning */ }
  setTimeout(scanLoop, 200);
}

/* ---------- wiring ---------- */
$('camstart').addEventListener('click', startCamera);
$('manualgo').addEventListener('click', () => {
  const v = $('serialbox').value.trim();
  if (!handleSerialSync(v)) setStatus('bad', 'Not a card serial', 'Serials look like KPMU-2026-00004217H — including the letter at the end.');
  $('serialbox').value = '';
});
function handleSerialSync(v) { const ok = SERIAL_RE.test(v); if (ok) handleSerial(v); return ok; }
$('serialbox').addEventListener('keydown', e => { if (e.key === 'Enter') $('manualgo').click(); });

const shopline = $('shopline');
if (shopName) {
  shopline.innerHTML = 'Logging redemptions for <b></b>' + (ckHex ? ' · serial check on' : '') + (demo ? '<span class="badge-demo">demo mode</span>' : '');
  shopline.querySelector('b').textContent = shopName;
} else if (shopSlug) {
  shopline.innerHTML = 'Unknown shop code &ldquo;<b></b>&rdquo; — scans will be logged under it, but check your register QR.' + (demo ? '<span class="badge-demo">demo mode</span>' : '');
  shopline.querySelector('b').textContent = shopSlug;
} else {
  shopline.textContent = 'No shop selected — pick yours below, or open this page from your register QR.';
  const pick = $('shoppick'), sel = $('shopselect');
  pick.hidden = false;
  for (const [slug, name] of Object.entries(SHOPS)) {
    const o = document.createElement('option');
    o.value = slug; o.textContent = name;
    sel.appendChild(o);
  }
  sel.addEventListener('change', () => {
    if (sel.value) location.replace('redeem.html?shop=' + encodeURIComponent(sel.value));
  });
  const s = $('setupnote'); s.hidden = false;
  s.innerHTML = 'Shops normally open this page from their register QR (<code>redeem.html?shop=your-shop-code</code>) so the shop is preset. Patrons: you probably want the <a href="index.html">Knox Pick-Me-Up site</a>.';
}
updateQueueNote();
flushQueue();
</script>
