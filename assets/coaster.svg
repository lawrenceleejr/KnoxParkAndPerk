<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Knox Park & Perk coaster">
  <defs>
    <linearGradient id="sky-k" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="50%" stop-color="#182142"/>
      <stop offset="82%" stop-color="#5c3312"/>
      <stop offset="100%" stop-color="#c85f00"/>
    </linearGradient>
    <linearGradient id="sun-k" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2cf"/>
      <stop offset="55%" stop-color="#ffb95e"/>
      <stop offset="100%" stop-color="#ff8200"/>
    </linearGradient>
    <clipPath id="disc-k"><circle cx="200" cy="200" r="196"/></clipPath>
    <clipPath id="horizon-k"><rect x="0" y="0" width="400" height="318"/></clipPath>
  </defs>

  <circle cx="200" cy="200" r="196" fill="url(#sky-k)"/>

  <g clip-path="url(#disc-k)">
    <!-- stars -->
    <g fill="#fff7ec">
      <circle cx="96" cy="70" r="2" opacity=".8"/>
      <circle cx="150" cy="52" r="1.6" opacity=".6"/>
      <circle cx="250" cy="52" r="1.6" opacity=".6"/>
      <circle cx="304" cy="72" r="2" opacity=".8"/>
      <circle cx="330" cy="120" r="1.6" opacity=".5"/>
      <circle cx="70" cy="120" r="1.6" opacity=".5"/>
    </g>

    <!-- rising sun motif near bottom -->
    <g clip-path="url(#horizon-k)">
      <g stroke="#ffb95e" stroke-width="4" stroke-linecap="round" opacity=".85">
        <line x1="200" y1="286" x2="200" y2="266"/>
        <line x1="228" y1="290" x2="236" y2="272"/>
        <line x1="172" y1="290" x2="164" y2="272"/>
        <line x1="252" y1="300" x2="266" y2="287"/>
        <line x1="148" y1="300" x2="134" y2="287"/>
      </g>
      <circle cx="200" cy="330" r="44" fill="url(#sun-k)"/>
    </g>
    <line x1="120" y1="332" x2="280" y2="332" stroke="#ffb95e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- top ring text -->
  <g fill="none"><path id="top-k" d="M38.7,124.7 A178,178 0 0 1 361.3,124.7"/></g>
  <text font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="26" fill="#ffb95e" letter-spacing="6"><textPath href="#top-k" startOffset="50%" text-anchor="middle">KNOX PARK &amp; PERK</textPath></text>

  <!-- center message -->
  <text x="200" y="150" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="19" fill="#ffb95e" letter-spacing="2">BOOKED YOUR RIDE HOME?</text>
  <text x="200" y="196" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="38" fill="#fff7ec" letter-spacing="1">SHOW YOUR</text>
  <text x="200" y="234" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="38" fill="#fff7ec" letter-spacing="1">BARTENDER</text>
  <text x="200" y="266" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="19" fill="#ffb95e">Tomorrow&#39;s coffee&#39;s on us.</text>

  <!-- bottom tagline -->
  <text x="200" y="372" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="12" fill="#fff7ec" letter-spacing="2.5" opacity=".9">FREE LARGE COFFEE &#183; FREE KAT RIDE</text>

  <!-- rims -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#ffb95e" stroke-width="6"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#ffb95e" stroke-width="1.5" opacity=".5"/>
</svg>
