<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Knox Park & Perk emblem">
  <defs>
    <linearGradient id="sky-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="45%" stop-color="#1b2749"/>
      <stop offset="76%" stop-color="#6b3a12"/>
      <stop offset="100%" stop-color="#ff8200"/>
    </linearGradient>
    <linearGradient id="sun-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2cf"/>
      <stop offset="55%" stop-color="#ffb95e"/>
      <stop offset="100%" stop-color="#ff8200"/>
    </linearGradient>
    <clipPath id="disc-m"><circle cx="120" cy="120" r="112"/></clipPath>
    <clipPath id="horizon-m"><rect x="4" y="8" width="232" height="146"/></clipPath>
  </defs>

  <!-- disc -->
  <circle cx="120" cy="120" r="112" fill="url(#sky-m)"/>

  <g clip-path="url(#disc-m)">
    <!-- distant stars -->
    <circle cx="70" cy="52" r="1.7" fill="#fff7ec" opacity=".85"/>
    <circle cx="168" cy="46" r="1.4" fill="#fff7ec" opacity=".7"/>
    <circle cx="150" cy="66" r="1.2" fill="#fff7ec" opacity=".6"/>
    <circle cx="92" cy="40" r="1.2" fill="#fff7ec" opacity=".55"/>
    <circle cx="120" cy="30" r="1.5" fill="#fff7ec" opacity=".75"/>

    <!-- rays + rising sun (clipped to above horizon) -->
    <g clip-path="url(#horizon-m)">
      <g stroke="#ffb95e" stroke-width="4" stroke-linecap="round" opacity=".9">
        <line x1="120" y1="92" x2="120" y2="76"/>
        <line x1="140.5" y1="95.6" x2="146" y2="80.6"/>
        <line x1="99.5" y1="95.6" x2="94" y2="80.6"/>
        <line x1="158.6" y1="106" x2="168.9" y2="93.8"/>
        <line x1="81.4" y1="106" x2="71.1" y2="93.8"/>
        <line x1="172" y1="122" x2="185.8" y2="114"/>
        <line x1="68" y1="122" x2="54.2" y2="114"/>
      </g>
      <circle cx="120" cy="152" r="56" fill="url(#sun-m)"/>
    </g>

    <!-- horizon -->
    <line x1="40" y1="154" x2="200" y2="154" stroke="#ffb95e" stroke-width="3" stroke-linecap="round"/>

    <!-- steam -->
    <g fill="none" stroke="#fff7ec" stroke-width="3.4" stroke-linecap="round" opacity=".75">
      <path d="M112,122 C108,114 116,108 112,99 C110,95 112,93 112,90"/>
      <path d="M128,122 C132,114 124,108 128,99 C130,95 128,93 128,90"/>
    </g>

    <!-- coffee cup -->
    <path d="M146,130 C160,130 160,149 145,147" fill="none" stroke="#fff7ec" stroke-width="4"/>
    <path d="M93,127 L147,127 L141,149 Q140,151 138,151 L102,151 Q100,151 99,149 Z" fill="#0c1224" stroke="#fff7ec" stroke-width="4" stroke-linejoin="round"/>
    <ellipse cx="120" cy="127" rx="27" ry="5" fill="#141d33" stroke="#fff7ec" stroke-width="4"/>
    <ellipse cx="120" cy="127" rx="20" ry="3" fill="#ff8200"/>
  </g>

  <!-- ring text -->
  <g fill="none"><path id="top-m" d="M27.3,82.5 A100,100 0 0 1 212.7,82.5"/><path id="bot-m" d="M27.3,157.5 A100,100 0 0 0 212.7,157.5"/></g>
  <g font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-weight="700" fill="#ffb95e" letter-spacing="3.5">
    <text font-size="19"><textPath href="#top-m" startOffset="50%" text-anchor="middle">KNOX PARK &amp; PERK</textPath></text>
    <text font-size="14"><textPath href="#bot-m" startOffset="50%" text-anchor="middle">MAKE IT HOME SAFE</textPath></text>
  </g>

  <!-- rims -->
  <circle cx="120" cy="120" r="112" fill="none" stroke="#ffb95e" stroke-width="5"/>
  <circle cx="120" cy="120" r="90" fill="none" stroke="#ffb95e" stroke-width="1" opacity=".45"/>
</svg>
